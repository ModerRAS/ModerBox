name: PR Validation

on:
  pull_request:
    branches:
      - master
jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Build Native
        run: dotnet publish ModerBox/ModerBox.csproj -p:PublishProfile=native -r win-x64 --configuration Release

      - name: Run Tests with Coverage
        run: dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: |
          reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:HtmlInline_AzurePipelines,Cobertura

      - name: Upload Coverage Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage-report

      - name: Check Coverage Threshold
        id: check-coverage
        run: |
          [xml]$COBERTURA = Get-Content coverage-report/Cobertura.xml
          $COVERAGE = [double]$COBERTURA.coverage.'line-rate'
          $COVERAGE_PERCENT = [math]::Round($COVERAGE * 100, 2)
          $THRESHOLD = 0.5  # 50% minimum coverage
          echo "coverage=$COVERAGE_PERCENT" >> $GITHUB_ENV
          echo "coverage=$COVERAGE_PERCENT" >> $GITHUB_OUTPUT
          if ($COVERAGE -lt $THRESHOLD) {
            echo "::error::Code coverage ($COVERAGE_PERCENT%) is below the required threshold ($($THRESHOLD * 100))%."
            exit 1
          }

      - name: Comment on Pull Request
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ✅ **Code Coverage Report**
            - **Minimum Required Coverage:** 50%
            - **Current Coverage:** ${{ steps.check-coverage.outputs.coverage }}%
            
            📄 **[View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})**
            
            🚀 Keep up the good work!
